<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="page-title">Article</title>

  <!-- Your existing CSS -->
  <link rel="stylesheet" href="style.css">

  <!-- Tailwind (same as your homepage) -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-[#050505] text-white">

  <!-- ✅ NAVBAR (same as homepage, COPY your nav here) -->
  <nav class="fixed top-8 left-0 w-full z-[100] px-4 flex flex-col items-center">
    <div class="bg-black border border-white/10 rounded-full p-1.5 flex items-center justify-between min-w-[340px] md:min-w-fit shadow-2xl">
      
      <div class="pl-4 pr-6 flex items-center">
        <a href="index.html">
          <img src="images/logo.png" class="h-5 ml-4">
        </a>
      </div>

      <div class="hidden md:flex items-center gap-1">
        <a href="#" class="nav-item">Articles</a>
        <a href="#" class="nav-item">About</a>
      </div>

    </div>
  </nav>

  <!-- ✅ TOP AD -->
  <div class="mt-32 max-w-5xl mx-auto px-4">
    <div class="bg-white/10 text-center py-6 rounded-xl">
      Top Advertisement
    </div>
  </div>

  <!-- ✅ MAIN LAYOUT -->
  <main class="max-w-6xl mx-auto mt-10 px-4 grid md:grid-cols-3 gap-8">

    <!-- 🔥 LEFT: ARTICLE -->
    <div class="md:col-span-2">

      <!-- TITLE -->
      <h1 id="title" class="text-3xl md:text-4xl font-black mb-4"></h1>

      <!-- META -->
      <p id="meta" class="text-gray-400 mb-6"></p>

      <!-- CONTENT -->
      <div id="content" class="space-y-6 text-gray-200 leading-relaxed"></div>

    </div>

    <!-- 🔥 RIGHT: SIDEBAR -->
    <aside>

      <!-- STICKY AD -->
      <div class="sticky bg-white/10 text-center py-20 rounded-xl">
        Sidebar Ad
      </div>

    </aside>

  </main>

  <!-- ✅ NEXT ARTICLES -->
  <section class="max-w-5xl mx-auto mt-16 px-4">
    <h2 class="text-2xl font-bold mb-6">More Articles</h2>

    <div id="next-articles" class="grid md:grid-cols-3 gap-6"></div>
  </section>

  <!-- ✅ BIG AD -->
  <div class="max-w-5xl mx-auto mt-12 px-4">
    <div class="bg-white/10 text-center py-10 rounded-xl">
      Large Advertisement Area
    </div>
  </div>

  <!-- ✅ FOOTER -->
  <footer class="mt-16 text-center text-gray-500 py-10 border-t border-white/10">
    © ASTANOW — All rights reserved
  </footer>

  <!-- ✅ SCRIPT -->
  <script src="js/article.js"></script>

</body>
</html>
