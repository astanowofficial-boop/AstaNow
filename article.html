<!DOCTYPE html>
<html>
<head>
  <title id="title"></title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- HEADER -->
  <header>
    <img src="/images/logo.png" alt="logo" height="40">
  </header>

  <!-- TOP AD -->
  <div class="ad-top">Ad Slot</div>

  <main class="container">

    <!-- ARTICLE -->
    <div class="content">
      <h1 id="article-title"></h1>
      <p id="meta"></p>

      <div id="article-body"></div>
    </div>

    <!-- SIDEBAR -->
    <aside>
      <div class="ad-sidebar sticky">Ad</div>

  </main>

  <!-- CONTINUATION SECTION -->
  <section id="next-articles"></section>

  <!-- BIG AD AREA -->
  <div class="ad-bottom">Advertisement</div>

  <!-- FOOTER -->
  <footer>
    <p>© YourSite</p>
  </footer>

  <script src="js/article.js"></script>

</html>
