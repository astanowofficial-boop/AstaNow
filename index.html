<!DOCTYPE html>
<html lang="en">
    <head> 
            <!-- # tells browser page language is English — good for SEO -->
               <meta charset="UTF-8" />    <!-- # UTF-8 means all characters including Hindi will work correctly -->
        <meta name="'viewport" content="width=device-width , intial-scale=1.0"/>
           <!-- # makes page look correct on mobile phones, not zoomed out -->
         <title>AstaNow</title>
             <!-- # text that appears on browser tab -->
        <link rel="stylesheet" href="style.css"/> 
          <!-- # connects your style.css file to this page -->
    </head>

    <body>
        <!-- # everything visible on screen goes inside body -->
     <!-- ============================
         TOP AD AREA
         Empty right now — invisible
         AdSense fills it when live
    ============================= -->
    <div class="top-ad-area"></div>
      <!-- ============================
         NAVBAR
         Contains: hamburger + logo + links + toggle
    ============================= -->


           <!--navigation Bar ..............-->

    <header class="navbar">

  <!-- # LEFT SIDE — hamburger button -->
  <button class="hamburger-btn" onclick="toggleSideMenu()">
    <!-- # three lines icon made with plain divs -->
    <div class="ham-line"></div>
    <div class="ham-line"></div>
    <div class="ham-line"></div>
  </button>

  <!-- # CENTER — logo -->
  <div class="navbar-logo">
    <a href="index.html">
      <!-- # replace logo.png with your actual logo filename -->
      <img src="logo.png" alt="AstaNow" class="logo-img" />
    </a>
  </div>

  <!-- # RIGHT SIDE — nav links -->
  <nav class="navbar-right">

    <!-- # About Us — simple link -->
    <a href="pages/about.html" class="nav-link">About Us</a>

    <!-- # Subscribe — button, will connect to OneSignal later -->
    <button class="nav-subscribe-btn">Subscribe</button>

    <!-- # Articles dropdown -->
    <div class="dropdown-wrapper">
      <button class="nav-link dropdown-trigger" onclick="toggleDropdown()">
        Articles ▾
      </button>
      <!-- # dropdown list — hidden by default -->
      <ul class="dropdown-menu" id="dropdownMenu">
        <li><a href="pages/technology.html" class="dropdown-item">Technology</a></li>
        <li><a href="pages/politics.html" class="dropdown-item">Politics</a></li>
        <li><a href="pages/mythology.html" class="dropdown-item">Mythology</a></li>
      </ul>
    </div>

    <!-- # Dark/Light toggle button -->
    <button class="theme-toggle-btn" onclick="toggleTheme()" title="Toggle dark/light">
      <!-- # moon icon shown in light mode -->
      <span class="icon-moon">🌙</span>
      <!-- # sun icon shown in dark mode -->
      <span class="icon-sun">☀️</span>
    </button>

  </nav>

</header>



                     <!-- navigations ends     -->

                     
      <!-- ============================
         HAMBURGER SIDE MENU
         Hidden by default
         Slides in when hamburger clicked
    ============================= -->
    <div class="side-menu">
         <!-- side menu content comes in Step 3 -->
    </div>

     <!-- ============================
         MAIN PAGE CONTENT
         Hero section + article cards
    ============================= -->

    <main class="main-content">
        <!-- content comes in Step 4 and 5 -->
    </main>

        <!-- ============================
         FOOTER
         Simple bottom bar
    ============================= --> 
    <footer class="footer">
        <!-- footer comes later -->
    </footer>

     <!-- # script.js loaded at bottom so HTML loads first -->
      <script src="script.js"> </script>
    </body>
</html>
