<!DOCTYPE html>
<html lang="en">
    <head> 
            <!-- # tells browser page language is English — good for SEO -->
               <meta charset="UTF-8" />    <!-- # UTF-8 means all characters including Hindi will work correctly -->
        <meta name="'viewport" content="width=device-width , intial-scale=1.0"/>
           <!-- # makes page look correct on mobile phones, not zoomed out -->
         <title>AstaNow</title>
             <!-- # text that appears on browser tab -->
        <link rel="stylesheet" href="style.css"/> 
          <!-- # connects your style.css file to this page -->
    </head>

    <body>
        <!-- # everything visible on screen goes inside body -->
     <!-- ============================
         TOP AD AREA
         Empty right now — invisible
         AdSense fills it when live
    ============================= -->
    <div class="top-ad-area"></div>
      <!-- ============================
         NAVBAR
         Contains: hamburger + logo + links + toggle
    ============================= -->


           <!--navigation Bar ..............-->

    <header class="navbar">

  <!-- # LEFT SIDE — logo on homepage -->
  <div class="navbar-logo">
    <a href="index.html">
      <img src="AstaNow.png" alt="AstaNow" class="logo-img" />
    </a>
  </div>

  <!-- # CENTER — nav links -->
  <nav class="navbar-right">

    <!-- # About Us -->
    <a href="pages/about.html" class="nav-link">About Us</a>

    <!-- # Subscribe -->
    <button class="nav-subscribe-btn">Subscribe</button>

    <!-- # Articles dropdown -->
    <div class="dropdown-wrapper">
      <button class="nav-link dropdown-trigger" onclick="toggleDropdown()">
        Articles ▾
      </button>
      <ul class="dropdown-menu" id="dropdownMenu">
        <li><a href="pages/technology.html" class="dropdown-item">Technology</a></li>

        <li><a href="pages/mythology.html" class="dropdown-item">Mythology</a></li>
      </ul>
    </div>

   <!-- # Dark/Light toggle — proper switch style -->
<div class="theme-switch" onclick="toggleTheme()" title="Toggle dark/light mode">
  <div class="switch-track">
    <span class="switch-icon">🌙</span>
    <div class="switch-thumb"></div>
  </div>
</div>

  </nav>

  <!-- # RIGHT SIDE — hamburger on homepage -->
  <button class="hamburger-btn" onclick="toggleSideMenu()">
    <div class="ham-line"></div>
    <div class="ham-line"></div>
    <div class="ham-line"></div>
  </button>

</header>


                     <!-- navigations ends     -->


     <!-- # dark overlay behind side menu -->
<div class="side-overlay" id="sideOverlay" onclick="toggleSideMenu()"></div>

<!-- # side menu panel -->
<div class="side-menu" id="sideMenu">

  <!-- # close button inside menu -->
  <button class="side-menu-close" onclick="toggleSideMenu()">✕</button>

  <!-- # menu heading -->
  <div class="side-menu-header">Menu</div>

  <!-- # page links -->
  <nav class="side-menu-links">
    <a href="pages/team.html" class="side-menu-item">
      <span>👥</span> Team
    </a>

      <span>ℹ️</span> About Us
    </a>
    <a href="pages/privacy.html" class="side-menu-item">
      <span>🔒</span> Privacy Policy
    </a>
    <a href="pages/terms.html" class="side-menu-item">
      <span>📄</span> Terms & Conditions
    </a>
  </nav>

</div> 

     <!-- ============================
         MAIN PAGE CONTENT
         Hero section + article cards
    ============================= -->

    <main class="main-content">

    </main>

         FOOTER

    ============================= --> 
    <footer class="footer">
        <!-- footer comes later -->
    </footer>

     <!-- # script.js loaded at bottom so HTML loads first -->
      <script src="script.js"> </script>

</html>
